<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Gridiron Command</title>
<meta name="theme-color" content="#07131d" />
<meta name="description" content="A mobile American football play-calling game for iPhone, iPad, and desktop." />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<style>
:root{--bg:#07131d;--panel:#102331;--panel2:#163247;--text:#eef7ff;--muted:#9bb2c4;--gold:#f5bd45;--red:#e85858;--green:#50d890;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:radial-gradient(circle at top,#163448 0,#07131d 55%,#03090e 100%);color:var(--text);font-family:Inter,ui-rounded,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
button,select{font:inherit}
#app{height:100%;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
.screen{display:none;height:100%}.screen.active{display:flex}
#menu{align-items:center;justify-content:center;padding:22px;background:linear-gradient(180deg,rgba(2,8,13,.15),rgba(2,8,13,.82)),radial-gradient(circle at 50% 22%,rgba(82,176,255,.22),transparent 34%)}
.menuCard{width:min(720px,100%);max-height:100%;overflow:auto;padding:26px;border:1px solid rgba(255,255,255,.12);border-radius:26px;background:linear-gradient(150deg,rgba(24,52,70,.97),rgba(8,22,31,.97));box-shadow:0 30px 90px rgba(0,0,0,.5)}
.logo{font-size:clamp(34px,8vw,66px);font-weight:1000;letter-spacing:-3px;line-height:.88;text-transform:uppercase;text-shadow:0 7px 25px rgba(0,0,0,.5)}
.logo span{color:var(--gold)}
.sub{margin:12px 0 24px;color:var(--muted);font-weight:700}
.teamGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:12px 0 18px}
.teamBtn{border:2px solid transparent;border-radius:16px;padding:13px 12px;color:white;text-align:left;background:linear-gradient(145deg,var(--c1),var(--c2));box-shadow:inset 0 1px rgba(255,255,255,.2),0 8px 20px rgba(0,0,0,.22)}
.teamBtn.selected{border-color:white;transform:translateY(-2px);box-shadow:0 0 0 3px rgba(245,189,69,.75),0 10px 25px rgba(0,0,0,.35)}
.teamBtn b{display:block;font-size:16px}.teamBtn small{opacity:.8}
.primary{width:100%;border:0;border-radius:17px;padding:16px;background:linear-gradient(180deg,#ffd267,#e6a72f);color:#1c1608;font-weight:1000;text-transform:uppercase;letter-spacing:.8px;box-shadow:0 10px 25px rgba(230,167,47,.25)}
.primary:active,.playBtn:active,.utility:active{transform:scale(.98)}
#game{flex-direction:column;background:#02080d}
.topbar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;padding:8px 10px;background:linear-gradient(180deg,#132b3b,#09151e);border-bottom:1px solid rgba(255,255,255,.1);min-height:72px}
.teamScore{display:flex;align-items:center;gap:8px;min-width:0}.teamScore.away{justify-content:flex-end;text-align:right}.badge{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;font-weight:1000;box-shadow:inset 0 1px rgba(255,255,255,.25)}
.name{font-size:12px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.score{font-size:28px;font-weight:1000;line-height:1}
.clockBox{text-align:center;background:#03080c;border:1px solid rgba(255,255,255,.13);border-radius:12px;padding:5px 10px;min-width:92px}.clock{font-size:19px;font-weight:1000;color:var(--gold)}.quarter{font-size:10px;color:var(--muted);font-weight:900;text-transform:uppercase}
.canvasWrap{position:relative;flex:1;min-height:0;background:#07110c;overflow:hidden}
canvas{width:100%;height:100%;display:block}
.hud{position:absolute;left:10px;right:10px;top:8px;display:flex;justify-content:space-between;pointer-events:none}.pill{background:rgba(2,9,14,.78);border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(8px);padding:7px 10px;border-radius:999px;font-size:12px;font-weight:900;box-shadow:0 5px 20px rgba(0,0,0,.3)}
.message{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);background:rgba(3,8,12,.88);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:14px 20px;text-align:center;font-size:22px;font-weight:1000;opacity:0;pointer-events:none;transition:opacity .2s;max-width:86%}.message.show{opacity:1}.message small{display:block;margin-top:4px;color:var(--muted);font-size:12px}
.controls{background:linear-gradient(180deg,#122a39,#091722);border-top:1px solid rgba(255,255,255,.12);padding:10px 10px calc(10px + env(safe-area-inset-bottom));min-height:180px}
.controlHeader{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.phase{font-weight:1000;font-size:16px}.hint{font-size:11px;color:var(--muted)}
.playGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.playBtn{position:relative;overflow:hidden;min-height:67px;border:1px solid rgba(255,255,255,.14);border-radius:14px;color:white;background:linear-gradient(160deg,#1d4359,#102637);text-align:left;padding:10px;box-shadow:inset 0 1px rgba(255,255,255,.08)}.playBtn b{font-size:13px;display:block}.playBtn small{font-size:10px;color:#b8cad6}.playBtn .route{position:absolute;right:5px;bottom:4px;font-size:23px;opacity:.36}.playBtn.selected{outline:2px solid var(--gold);background:linear-gradient(160deg,#315d70,#183749)}
.utilityRow{display:flex;gap:8px;margin-top:8px}.utility{flex:1;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px;color:white;background:#0b1b25;font-weight:850}.utility.danger{color:#ffadad}
.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.72);z-index:10}.modal.show{display:flex}.modalCard{width:min(480px,100%);background:linear-gradient(150deg,#17374a,#081720);border:1px solid rgba(255,255,255,.14);border-radius:22px;padding:22px;text-align:center;box-shadow:0 30px 90px #000}.modalCard h2{margin:0 0 8px;font-size:31px}.modalCard p{color:var(--muted)}
@media (min-width:700px){.teamGrid{grid-template-columns:repeat(4,1fr)}.controls{min-height:164px}.playGrid{grid-template-columns:repeat(6,1fr)}}
</style>
</head>
<body>
<div id="app">
<section id="menu" class="screen active">
 <div class="menuCard">
  <div class="logo">Gridiron<br><span>Command</span></div>
  <div class="sub">A touch-first football strategy game. Call the plays. Outsmart the defense. Try not to blame the virtual referees.</div>
  <div style="font-weight:1000">CHOOSE YOUR TEAM</div>
  <div id="teamGrid" class="teamGrid"></div>
  <button id="startBtn" class="primary">Start Exhibition</button>
  <button id="continueBtn" class="utility" style="width:100%;margin-top:10px;display:none">Continue Saved Game</button>
 </div>
</section>
<section id="game" class="screen">
 <div class="topbar">
   <div class="teamScore"><div id="homeBadge" class="badge"></div><div><div id="homeName" class="name"></div><div id="homeScore" class="score">0</div></div></div>
   <div class="clockBox"><div id="clock" class="clock">3:00</div><div id="quarter" class="quarter">1st Quarter</div></div>
   <div class="teamScore away"><div><div id="awayName" class="name"></div><div id="awayScore" class="score">0</div></div><div id="awayBadge" class="badge"></div></div>
 </div>
 <div class="canvasWrap">
   <canvas id="field"></canvas>
   <div class="hud"><div id="downPill" class="pill">1st & 10</div><div id="ballPill" class="pill">Ball: OWN 25</div></div>
   <div id="message" class="message"></div>
 </div>
 <div class="controls">
   <div class="controlHeader"><div id="phase" class="phase">Choose an offensive play</div><div id="hint" class="hint">Tap a play to run it</div></div>
   <div id="playGrid" class="playGrid"></div>
   <div class="utilityRow"><button id="timeoutBtn" class="utility">Timeout (3)</button><button id="saveBtn" class="utility">Save Game</button><button id="quitBtn" class="utility danger">Quit</button></div>
 </div>
</section>
</div>
<div id="endModal" class="modal"><div class="modalCard"><h2 id="endTitle">Final</h2><p id="endText"></p><button id="rematchBtn" class="primary">Return to Menu</button></div></div>
<script>
const teams=[
 {city:'Virginia',name:'Voyagers',abbr:'VIR',c1:'#264e86',c2:'#e5792a',rating:82},
 {city:'Baltimore',name:'Guardians',abbr:'BAL',c1:'#39266f',c2:'#111827',rating:84},
 {city:'New York',name:'Knights',abbr:'NYK',c1:'#173f72',c2:'#d7dce2',rating:81},
 {city:'Boston',name:'Rebels',abbr:'BOS',c1:'#14325b',c2:'#bb2433',rating:85},
 {city:'Miami',name:'Sharks',abbr:'MIA',c1:'#008c95',c2:'#f17730',rating:80},
 {city:'Dallas',name:'Marshals',abbr:'DAL',c1:'#20385e',c2:'#aeb9c5',rating:86},
 {city:'Chicago',name:'Forge',abbr:'CHI',c1:'#142c48',c2:'#d25b22',rating:79},
 {city:'Detroit',name:'Motors',abbr:'DET',c1:'#1773ad',c2:'#b8c2ca',rating:78},
 {city:'Seattle',name:'Orcas',abbr:'SEA',c1:'#123354',c2:'#58b947',rating:84},
 {city:'San Francisco',name:'Gold',abbr:'SFG',c1:'#ad2831',c2:'#d9b64c',rating:87},
 {city:'Denver',name:'Summit',abbr:'DEN',c1:'#173b68',c2:'#f26a24',rating:82},
 {city:'Phoenix',name:'Firebirds',abbr:'PHX',c1:'#8f1d2c',c2:'#e59b22',rating:79},
 {city:'Atlanta',name:'Flight',abbr:'ATL',c1:'#ae1f2d',c2:'#20242b',rating:81},
 {city:'New Orleans',name:'Spirits',abbr:'NOL',c1:'#9d7b34',c2:'#111317',rating:83},
 {city:'Kansas City',name:'Kings',abbr:'KCK',c1:'#bd1d2c',c2:'#eeb444',rating:88},
 {city:'Las Vegas',name:'Outlaws',abbr:'LVG',c1:'#252a2e',c2:'#9fa8ae',rating:80}
];
const offense=[
 {id:'inside',name:'Inside Run',desc:'Safe power rush',route:'↟',risk:.10,base:4,type:'run'},
 {id:'outside',name:'Outside Run',desc:'Boom or loss',route:'↗',risk:.22,base:5,type:'run'},
 {id:'screen',name:'HB Screen',desc:'Beats blitzes',route:'⌁',risk:.18,base:6,type:'pass'},
 {id:'slants',name:'Quick Slants',desc:'Fast short pass',route:'⤢',risk:.16,base:7,type:'pass'},
 {id:'cross',name:'Crossing Routes',desc:'Medium concept',route:'✕',risk:.24,base:10,type:'pass'},
 {id:'deep',name:'Four Verticals',desc:'High-risk bomb',route:'⇈',risk:.38,base:18,type:'pass'}
];
const defense=[
 {id:'run',name:'Run Commit',desc:'Crush inside runs',route:'▰',type:'run'},
 {id:'zone',name:'Cover 2 Zone',desc:'Protect sidelines',route:'◒',type:'zone'},
 {id:'man',name:'Man Coverage',desc:'Tight short coverage',route:'◎',type:'man'},
 {id:'blitz',name:'All-Out Blitz',desc:'Pressure or disaster',route:'⚡',type:'blitz'},
 {id:'prevent',name:'Prevent',desc:'Stop deep shots',route:'⬡',type:'prevent'},
 {id:'spy',name:'QB Spy',desc:'Balanced contain',route:'◇',type:'spy'}
];
let selectedTeam=0, state=null, anim=null, dpr=1, ctx, W=0,H=0;
const $=id=>document.getElementById(id);
function ordinal(n){return n===1?'1st':n===2?'2nd':n===3?'3rd':n+'th'}
function buildTeams(){ $('teamGrid').innerHTML=''; teams.forEach((t,i)=>{let b=document.createElement('button');b.className='teamBtn'+(i===selectedTeam?' selected':'');b.style.setProperty('--c1',t.c1);b.style.setProperty('--c2',t.c2);b.innerHTML=`<b>${t.city} ${t.name}</b><small>${t.abbr} · Rating ${t.rating}</small>`;b.onclick=()=>{selectedTeam=i;buildTeams()};$('teamGrid').appendChild(b)}); }
function newGame(){
 let opp;do{opp=Math.floor(Math.random()*teams.length)}while(opp===selectedTeam);
 state={home:selectedTeam,away:opp,score:[0,0],quarter:1,clock:180,possession:0,ball:25,down:1,toGo:10,timeouts:[3,3],phase:'offense',last:'Kickoff return to the 25',gameOver:false};
 save();showGame();flash('Kickoff','Your ball at the 25');renderChoices();draw();
}
function showGame(){ $('menu').classList.remove('active');$('game').classList.add('active'); updateUI(); resize(); }
function updateUI(){if(!state)return;let h=teams[state.home],a=teams[state.away];$('homeName').textContent=h.abbr;$('awayName').textContent=a.abbr;$('homeScore').textContent=state.score[0];$('awayScore').textContent=state.score[1];setBadge('homeBadge',h);setBadge('awayBadge',a);$('clock').textContent=`${Math.floor(state.clock/60)}:${String(state.clock%60).padStart(2,'0')}`;$('quarter').textContent=state.quarter<=4?`${ordinal(state.quarter)} Quarter`:'Overtime';$('downPill').textContent=`${ordinal(state.down)} & ${state.toGo}`;let side=state.ball<50?`OWN ${state.ball}`:`OPP ${100-state.ball}`;$('ballPill').textContent=`Ball: ${side}`;$('timeoutBtn').textContent=`Timeout (${state.timeouts[state.possession]})`;}
function setBadge(id,t){let e=$(id);e.textContent=t.abbr;e.style.background=`linear-gradient(145deg,${t.c1},${t.c2})`}
function renderChoices(){if(state.gameOver)return;let userOff=state.possession===0;state.phase=userOff?'offense':'defense';let arr=userOff?offense:defense;$('phase').textContent=userOff?'Choose an offensive play':'Choose a defensive play';$('hint').textContent=userOff?'Advance toward the right end zone':'Predict the opponent’s call';$('playGrid').innerHTML='';arr.forEach(p=>{let b=document.createElement('button');b.className='playBtn';b.innerHTML=`<b>${p.name}</b><small>${p.desc}</small><span class="route">${p.route}</span>`;b.onclick=()=>runSnap(p);$('playGrid').appendChild(b)});updateUI();}
function chooseAIPlay(userOff){if(userOff){let weights=state.toGo>8?[.08,.08,.14,.22,.26,.22]:[.2,.15,.18,.24,.16,.07];return weighted(defense,weights)}let need=state.toGo;let weights=need<=3?[.28,.19,.17,.14,.06,.16]:need>=10?[.08,.15,.16,.16,.25,.2]:[.15,.2,.2,.18,.1,.17];return weighted(offense,weights)}
function weighted(arr,w){let r=Math.random(),s=0;for(let i=0;i<arr.length;i++){s+=w[i];if(r<=s)return arr[i]}return arr[arr.length-1]}
function runSnap(userPlay){if(anim||state.gameOver)return;let userOff=state.possession===0;let off=userOff?userPlay:chooseAIPlay(false);let def=userOff?chooseAIPlay(true):userPlay;resolvePlay(off,def,userOff)}
function resolvePlay(off,def,userOff){
 let offenseTeam=teams[state.possession===0?state.home:state.away], defenseTeam=teams[state.possession===0?state.away:state.home];
 let edge=(offenseTeam.rating-defenseTeam.rating)/25;let matchup=0;
 if(off.type==='run'&&def.type==='run')matchup-=2.8;if(off.type==='run'&&def.type==='prevent')matchup+=3.2;if(off.id==='deep'&&def.type==='prevent')matchup-=7;if(off.id==='deep'&&def.type==='blitz')matchup+=5;if(off.id==='screen'&&def.type==='blitz')matchup+=7;if(off.id==='slants'&&def.type==='man')matchup-=3;if(off.id==='cross'&&def.type==='zone')matchup-=2.5;
 let turnover=false,sack=false,incomplete=false,yards=0,roll=Math.random();
 if(off.type==='pass'){
   let pressure=def.type==='blitz'?.18:.07;if(roll<pressure-offenseTeam.rating/900){sack=true;yards=-(3+Math.floor(Math.random()*7));}
   else if(roll<pressure+off.risk*.48){incomplete=true;yards=0;}
   else if(roll>0.975-off.risk*.11){turnover=true;yards=Math.floor(Math.random()*10);}
   else{yards=Math.round(off.base+matchup+edge+randn()*5);if(Math.random()<.08+off.risk*.15)yards+=12+Math.floor(Math.random()*24);yards=Math.max(-2,yards)}
 }else{
   if(roll>.992){turnover=true;yards=Math.max(0,Math.round(off.base+randn()*3));}
   else{yards=Math.round(off.base+matchup+edge+randn()*4);if(Math.random()<.07)yards+=10+Math.floor(Math.random()*20);yards=Math.max(-5,yards)}
 }
 let elapsed=off.type==='run'?18+Math.floor(Math.random()*18):incomplete?5+Math.floor(Math.random()*5):12+Math.floor(Math.random()*20);
 let startBall=state.ball;animatePlay(off,yards,turnover,()=>finishPlay(off,def,yards,turnover,sack,incomplete,elapsed,startBall,userOff));
}
function randn(){return (Math.random()+Math.random()+Math.random()+Math.random()-2)}
function finishPlay(off,def,yards,turnover,sack,incomplete,elapsed,startBall,userOff){
 state.clock=Math.max(0,state.clock-elapsed);let text='';
 if(sack)text=`SACK! ${Math.abs(yards)} yard loss`;else if(incomplete)text='Pass incomplete';else if(turnover)text='TURNOVER!';else text=`${yards>=0?'+':''}${yards} yards`;
 if(!turnover)state.ball+=yards;
 if(state.ball>=100&&!turnover){touchdown();return}
 if(state.ball<=0&&!turnover){state.score[1-state.possession]+=2;flash('SAFETY!','Two points and possession change');switchPossession(25);advanceClock();return}
 if(turnover){state.ball=100-(startBall+yards);state.ball=Math.max(5,Math.min(95,state.ball));flash(text,`${off.name} vs ${def.name}`);switchPossession(state.ball);advanceClock();return}
 state.toGo-=yards;
 if(state.toGo<=0){state.down=1;state.toGo=Math.min(10,100-state.ball);flash('FIRST DOWN',text)}else{state.down++;flash(text,`${off.name} vs ${def.name}`)}
 if(state.down>4){flash('TURNOVER ON DOWNS',text);switchPossession(100-state.ball)}
 advanceClock();
}
function touchdown(){state.score[state.possession]+=7;flash('TOUCHDOWN!',`${teams[state.possession===0?state.home:state.away].city} scores`);setTimeout(()=>{switchPossession(25);advanceClock()},1000)}
function switchPossession(newBall){state.possession=1-state.possession;state.ball=newBall;state.down=1;state.toGo=Math.min(10,100-state.ball)}
function advanceClock(){
 if(state.clock<=0){state.quarter++;if(state.quarter>4){if(state.score[0]===state.score[1]){state.quarter=5;state.clock=120;flash('OVERTIME','Next score wins')}else{return endGame()}}else{state.clock=180;flash(state.quarter===3?'HALFTIME':'END OF QUARTER',state.quarter===3?'Possession continues':'New quarter begins')}}
 save();setTimeout(()=>{renderChoices();draw()},800);updateUI();
}
function animatePlay(off,yards,turnover,done){anim={t:0,duration:850,off,yards,turnover,done};requestAnimationFrame(stepAnim)}
function stepAnim(ts){if(!anim.start)anim.start=ts;anim.t=Math.min(1,(ts-anim.start)/anim.duration);draw();if(anim.t<1)requestAnimationFrame(stepAnim);else{let d=anim.done;anim=null;d();draw()}}
function flash(main,sub=''){let m=$('message');m.innerHTML=`${main}<small>${sub}</small>`;m.classList.add('show');setTimeout(()=>m.classList.remove('show'),1050)}
function endGame(){state.gameOver=true;localStorage.removeItem('gridironSave');let h=teams[state.home],a=teams[state.away];$('endTitle').textContent=state.score[0]>state.score[1]?'Victory':'Defeat';$('endText').textContent=`${h.city} ${state.score[0]} – ${state.score[1]} ${a.city}`;$('endModal').classList.add('show');updateUI()}
function save(){if(state&&!state.gameOver)localStorage.setItem('gridironSave',JSON.stringify(state));$('continueBtn').style.display=localStorage.getItem('gridironSave')?'block':'none'}
function load(){try{state=JSON.parse(localStorage.getItem('gridironSave'));if(state){showGame();renderChoices();draw()}}catch(e){localStorage.removeItem('gridironSave')}}
function resize(){let c=$('field'),r=c.getBoundingClientRect();dpr=Math.min(2,devicePixelRatio||1);c.width=r.width*dpr;c.height=r.height*dpr;W=r.width;H=r.height;ctx=c.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);draw()}
function draw(){if(!ctx||!state)return;ctx.clearRect(0,0,W,H);let margin=Math.max(20,W*.055),top=36,bottom=22,fw=W-margin*2,fh=H-top-bottom;
 let grad=ctx.createLinearGradient(0,top,0,top+fh);grad.addColorStop(0,'#1e7541');grad.addColorStop(1,'#10542d');ctx.fillStyle=grad;ctx.fillRect(margin,top,fw,fh);
 for(let i=0;i<10;i++){ctx.fillStyle=i%2?'rgba(255,255,255,.025)':'rgba(0,0,0,.05)';ctx.fillRect(margin+fw*i/10,top,fw/10,fh)}
 ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=1;for(let i=0;i<=10;i++){let x=margin+fw*i/10;ctx.beginPath();ctx.moveTo(x,top);ctx.lineTo(x,top+fh);ctx.stroke();if(i>0&&i<10){ctx.fillStyle='rgba(255,255,255,.65)';ctx.font='700 11px system-ui';ctx.textAlign='center';let n=i<=5?i*10:(10-i)*10;ctx.fillText(n,x,top+18);ctx.fillText(n,x,top+fh-9)}}
 ctx.fillStyle=teams[state.home].c1;ctx.fillRect(margin-fw*.09,top,fw*.09,fh);ctx.fillStyle=teams[state.away].c1;ctx.fillRect(margin+fw,top,fw*.09,fh);
 let losX=margin+fw*(state.ball/100);ctx.strokeStyle='#f5bd45';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(losX,top);ctx.lineTo(losX,top+fh);ctx.stroke();let firstX=margin+fw*Math.min(1,(state.ball+state.toGo)/100);ctx.strokeStyle='rgba(80,216,144,.9)';ctx.lineWidth=2;ctx.setLineDash([6,5]);ctx.beginPath();ctx.moveTo(firstX,top);ctx.lineTo(firstX,top+fh);ctx.stroke();ctx.setLineDash([]);
 let dir=state.possession===0?1:-1;let baseX=losX-dir*10;let mid=top+fh*.55;drawPlayers(baseX,mid,dir,fw,fh);
 if(anim){let p=ease(anim.t),travel=Math.max(-.05,Math.min(.32,anim.yards/100));let bx=baseX+fw*travel*p*dir;let by=mid-Math.sin(p*Math.PI)*Math.min(80,fw*.18)*(anim.off.type==='pass'?1:.25);drawBall(bx,by,dir);}
 else drawBall(baseX-dir*8,mid,dir);
 ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=5;ctx.strokeRect(margin,top,fw,fh);
}
function ease(t){return 1-Math.pow(1-t,3)}
function drawPlayers(baseX,mid,dir,fw,fh){let own=teams[state.possession===0?state.home:state.away],opp=teams[state.possession===0?state.away:state.home];let scale=Math.max(.75,Math.min(1.15,W/430));let positions=[[-10,0],[-24,-34],[-24,34],[-45,-65],[-45,65],[-62,0]];positions.forEach((p,i)=>drawPlayer(baseX+p[0]*dir,mid+p[1],own.c1,own.c2,scale,i===5));let defs=[[12,0],[26,-38],[26,38],[53,-70],[53,70],[75,0]];defs.forEach(p=>drawPlayer(baseX+p[0]*dir,mid+p[1],opp.c1,opp.c2,scale,false))}
function drawPlayer(x,y,c1,c2,s,qb){ctx.save();ctx.translate(x,y);ctx.shadowColor='rgba(0,0,0,.4)';ctx.shadowBlur=7;ctx.fillStyle=c2;ctx.beginPath();ctx.ellipse(0,8,8*s,12*s,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=c1;ctx.beginPath();ctx.roundRect(-8*s,-7*s,16*s,18*s,5*s);ctx.fill();ctx.fillStyle='#f0c7a2';ctx.beginPath();ctx.arc(0,-10*s,6*s,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.8)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-5*s,-10*s);ctx.lineTo(5*s,-10*s);ctx.stroke();if(qb){ctx.fillStyle='white';ctx.font=`900 ${8*s}px system-ui`;ctx.textAlign='center';ctx.fillText('Q',0,5*s)}ctx.restore()}
function drawBall(x,y,dir){ctx.save();ctx.translate(x,y);ctx.rotate(dir*.18);ctx.fillStyle='#8d4a22';ctx.strokeStyle='#4c250f';ctx.lineWidth=1.5;ctx.beginPath();ctx.ellipse(0,0,8,4.7,0,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.strokeStyle='white';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(-2,-2.5);ctx.lineTo(2,2.5);ctx.stroke();ctx.restore()}
$('startBtn').onclick=newGame;$('continueBtn').onclick=load;$('saveBtn').onclick=()=>{save();flash('GAME SAVED','Stored on this device')};$('quitBtn').onclick=()=>{save();$('game').classList.remove('active');$('menu').classList.add('active');buildTeams()};$('timeoutBtn').onclick=()=>{let i=state.possession;if(state.timeouts[i]>0){state.timeouts[i]--;state.clock=Math.min(180,state.clock+15);flash('TIMEOUT','15 seconds restored for mobile pacing');save();updateUI()}else flash('NO TIMEOUTS','You have used all three')};$('rematchBtn').onclick=()=>{$('endModal').classList.remove('show');$('game').classList.remove('active');$('menu').classList.add('active');buildTeams()};window.addEventListener('resize',resize);document.addEventListener('visibilitychange',()=>{if(document.hidden)save()});buildTeams();save();
</script>
